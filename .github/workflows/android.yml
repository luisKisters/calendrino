name: Android APK

# Builds an Android APK on every push to the `release` branch (and on manual
# dispatch). The APK is uploaded as a build artifact and attached to a GitHub
# pre-release. Without signing secrets it produces an installable *debug* APK;
# with secrets configured it produces a *signed release* APK. See BUILDING.md.

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          # arm64 only — covers all modern Android devices and keeps the APK small.
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Point Tauri at the preinstalled NDK
        run: echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm run test:all

      - name: Initialize Android project
        run: pnpm run tauri android init

      - name: Detect signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEY_BASE64 }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEY_BASE64 secret set — building an installable DEBUG APK. See BUILDING.md to enable signed release builds."
          fi

      - name: Build release APK (unsigned, arm64)
        if: steps.signing.outputs.enabled == 'true'
        run: pnpm run tauri android build -- --apk --target aarch64

      - name: Sign release APK with apksigner
        if: steps.signing.outputs.enabled == 'true'
        env:
          KS_B64: ${{ secrets.ANDROID_KEY_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -eu
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          BUILD_TOOLS="$(ls -d "$SDK"/build-tools/* | sort -V | tail -1)"
          echo "Using build-tools: $BUILD_TOOLS"
          UNSIGNED="$(find src-tauri/gen/android -name '*-release-unsigned.apk' | head -1)"
          echo "Unsigned APK: $UNSIGNED"
          base64 -d <<< "$KS_B64" > "$RUNNER_TEMP/keystore.jks"
          mkdir -p artifacts
          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --key-pass "pass:$KS_PASS" \
            --out artifacts/calendrino-release-arm64.apk \
            "$RUNNER_TEMP/aligned.apk"
          "$BUILD_TOOLS/apksigner" verify --verbose artifacts/calendrino-release-arm64.apk
          ls -la artifacts

      - name: Build debug APK (arm64, no signing secrets)
        if: steps.signing.outputs.enabled != 'true'
        run: pnpm run tauri android build -- --apk --debug --target aarch64

      - name: Collect debug APK
        if: steps.signing.outputs.enabled != 'true'
        run: |
          mkdir -p artifacts
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calendrino-android-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Calendrino Android build #${{ github.run_number }}
          prerelease: false
          make_latest: true
          files: artifacts/*.apk
