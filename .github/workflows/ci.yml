name: CI

# Runs the full test suite (unit + Vitest live-extraction + Playwright e2e) on
# every push to main/release and on every pull request. Provider API keys come
# from GitHub Actions secrets — they are never committed. Any provider whose
# secret is absent (or out of quota / unusable) simply skips its live tests, so
# CI stays green without requiring every key to be configured.

on:
  push:
    branches: [main, release]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests (unit + live extraction + e2e)
        run: pnpm run test:all
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build
        run: pnpm run build
