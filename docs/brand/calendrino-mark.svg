    <rect x="181" y="247" width="30" height="22" rx="7"/>
    <rect x="241" y="247" width="30" height="22" rx="7"/>
    <rect x="301" y="247" width="30" height="22" rx="7"/>
    <rect x="181" y="343" width="30" height="22" rx="7"/>
    <rect x="301" y="343" width="30" height="22" rx="7"/>
  </g>

  <!-- the magic day: AI sparkle -->
  <path d="M256 264 Q265 297 298 306 Q265 315 256 348 Q247 315 214 306 Q247 297 256 264 Z" fill="url(#spark)"/>
